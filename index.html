<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#14082b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>¡Átomo Loco!</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
<link rel="stylesheet" href="style.css?v=16">
</head>
<body>
<div id="game">

  <header id="hud">
    <div id="hud-left">
      <div id="protium-badge" hidden>H·<span id="protium-n">0</span></div>
    </div>
    <div id="hud-center">
      <div id="logo">¡ÁTOMO LOCO!</div>
      <div id="energy">0</div>
      <div id="eps">0 /s</div>
    </div>
    <div id="hud-right">
      <button id="mute" aria-label="sonido">♪</button>
    </div>
  </header>

  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="floaters"></div>
    <div id="combo-wrap"><div id="combo-bar"></div></div>
    <div id="fever-label" hidden>¡FUSIÓN x5!</div>
    <div id="buff-label" hidden></div>
    <div id="quark" hidden></div>
    <div id="colapso-badge" hidden>
      <div id="colapso-fill"></div>
      <span id="colapso-txt">☀ 0%</span>
    </div>
    <div id="colapso-count" hidden></div>
  </div>

  <div id="screen-star" hidden>
    <div id="star-stage">
      <canvas id="starcv"></canvas>
      <div id="star-floaters"></div>
      <div id="star-top">
        <div id="temp-gauge">
          <div id="temp-floor-fill"></div>
          <div id="temp-hfloor-fill"></div>
          <div id="temp-fill"></div>
          <div id="temp-marks"></div>
          <div id="temp-eq" hidden></div>
          <div id="temp-tick"></div>
        </div>
        <div id="temp-val">0°</div>
      </div>
      <div id="hgen-chip" hidden>♨ +0°/h</div>
      <div id="nova-badge" hidden>💥 Fe 0/1</div>
      <div id="fusion-sheet">
        <div id="sheet-handle"><span></span></div>
        <div id="fuse-row">
          <button id="fuse-btn">⚛ FUSIONAR</button>
          <button id="fuse10-btn">×10</button>
        </div>
        <div id="reactor"></div>
        <div id="chips"></div>
      </div>
    </div>
  </div>

  <div id="screen-elements" hidden>
    <div id="elements-head">
      <div id="el-wallet">H × 0</div>
      <div id="el-progress">0/23</div>
      <div id="el-mult">×1.00 A TODO</div>
    </div>
    <button id="lab-btn" hidden>🔬 SINTETIZAR</button>
    <div id="elements-grid"></div>
    <div id="elements-hint">Gana HIDRÓGENO con el ☀ COLAPSO en el motor</div>
  </div>

  <footer id="shop"></footer>

  <nav id="nav">
    <button class="nav-tab active" id="tab-motor">⚛ MOTOR</button>
    <button class="nav-tab" id="tab-star">⭐ ESTRELLA<span class="nav-dot" hidden></span></button>
    <button class="nav-tab" id="tab-tabla">🧪 TABLA<span class="nav-dot" hidden></span></button>
  </nav>

  <div id="nova-flash" hidden></div>

  <div id="toast" hidden></div>

  <div id="modal-back" hidden>
    <div id="modal">
      <div id="modal-title"></div>
      <div id="modal-body"></div>
      <div id="modal-buttons"></div>
    </div>
  </div>

</div>
<script src="game.js?v=16"></script>
</body>
</html>
